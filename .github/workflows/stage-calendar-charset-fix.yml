name: Stage calendar charset fix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ops/fix-calendar-charset.sh
      - .github/workflows/stage-calendar-charset-fix.yml

jobs:
  stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate fix script
        run: bash -n ops/fix-calendar-charset.sh

      - name: Upload fix script
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ops/fix-calendar-charset.sh"
          target: "/tmp/calendar-charset-fix"
          strip_components: 1

      - name: Show one-time fix command
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            test -s /tmp/calendar-charset-fix/fix-calendar-charset.sh
            echo "Charset fix staged successfully. Run once as an administrator:"
            echo "  sudo bash /tmp/calendar-charset-fix/fix-calendar-charset.sh"
