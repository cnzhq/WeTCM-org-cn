name: Deploy managed redirects

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - config/redirects.json
      - scripts/generate-redirect-nginx.cjs
      - ops/deploy-managed-redirects
      - .github/workflows/configure-zhq-redirect.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and generate Nginx configuration
        run: node scripts/generate-redirect-nginx.cjs

      - name: Upload generated configuration
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".redirect-build/*"
          target: "/tmp/managed-redirects"
          strip_components: 1

      - name: Upload one-time server setup files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ops/deploy-managed-redirects,ops/install-redirect-deployer.sh"
          target: "/tmp/managed-redirects"
          strip_components: 1

      - name: Deploy redirects
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if ! sudo -n /usr/local/sbin/deploy-managed-redirects; then
              echo "Redirect deployer is not authorized yet." >&2
              echo "SSH into the server once and run:" >&2
              echo "  sudo bash /tmp/managed-redirects/install-redirect-deployer.sh" >&2
              exit 1
            fi
