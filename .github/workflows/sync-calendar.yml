name: Sync Calendars

on:
  schedule:
    - cron: '0 * * * *'  # 每小时执行
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout we-cal repo
        uses: actions/checkout@v4
        with:
          repository: cnzhq/we-cal
          path: we-cal

      - name: Deploy calendars folder to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "we-cal/calendars/*"
          target: "/var/www/html/"
          strip_components: 1

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            echo "Deployed calendars:"
            ls -la /var/www/html/calendars/
            echo ""
            echo "Available at:"
            for file in /var/www/html/calendars/*.ics; do
              echo "  https://cal.wetcm.org.cn/$(basename $file)"
            done

            echo ""
            echo "Checking cal.wetcm.org.cn TLS certificate and HTTPS endpoint..."
            calendar_headers=$(mktemp)
            trap 'rm -f "$calendar_headers"' EXIT
            echo | openssl s_client \
              -connect cal.wetcm.org.cn:443 \
              -servername cal.wetcm.org.cn 2>/dev/null | \
              openssl x509 -noout -subject -issuer -dates -ext subjectAltName

            if ! echo | openssl s_client \
              -connect cal.wetcm.org.cn:443 \
              -servername cal.wetcm.org.cn 2>/dev/null | \
              openssl x509 -checkend 1209600 -noout; then
              echo "The cal.wetcm.org.cn certificate expires in less than 14 days." >&2
              exit 1
            fi

            curl \
              --noproxy '*' \
              --fail \
              --silent \
              --show-error \
              --head \
              --connect-timeout 10 \
              --max-time 30 \
              --dump-header "$calendar_headers" \
              --output /dev/null \
              https://cal.wetcm.org.cn/

            cat "$calendar_headers"
            if ! grep -Eiq '^content-type:[[:space:]]*text/html;[[:space:]]*charset=utf-8' "$calendar_headers"; then
              echo "The calendar directory response does not declare UTF-8." >&2
              exit 1
            fi
