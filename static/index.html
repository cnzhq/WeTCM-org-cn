<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wetcm.org.cn - Redirecting...</title>
  <script>
    (function() {
      // 1. 获取用户的浏览器语言 (如 'zh-CN', 'zh-TW', 'en-US')
      var userLang = navigator.language || navigator.userLanguage;
      var targetUrl = '/en/'; // 默认后备语言设为英文

      // 2. 根据语言特征进行匹配判断
      if (userLang.toLowerCase().includes('zh-tw') || userLang.toLowerCase().includes('zh-hk')) {
        targetUrl = '/zh-Hant/'; // 台湾、香港用户去繁体页
      } else if (userLang.toLowerCase().includes('zh')) {
        targetUrl = '/zh-Hans/'; // 其他中文用户（大陆、新马等）去简体页
      }

      // 3. 携带原有的路径后缀进行跳转（比如用户访问 wetcm.org.cn/docs/intro，会跳到 wetcm.org.cn/zh-Hans/docs/intro）
      var currentPath = window.location.pathname;
      if (currentPath === '/' || currentPath === '/index.html') {
        window.location.replace(targetUrl);
      } else {
        window.location.replace(targetUrl.replace(/\/$/, "") + currentPath);
      }
    })();
  </script>
</head>
<body>
  <p>正在根据您的语言偏好跳转 / Redirecting based on your language preferences...</p>
</body>
</html>
